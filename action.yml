name: MCPFlight contract diff
description: Run mcpflight diff, comment the report on PRs, and fail on breaking MCP contract drift.

inputs:
  config:
    description: Path to mcpflight.toml in the checked-out repository.
    required: false
    default: mcpflight.toml
  github-token:
    description: GitHub token used to comment on pull requests.
    required: false
  comment:
    description: Whether to post the diff as a pull request comment.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install MCPFlight
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run MCPFlight diff
      id: diff
      shell: bash
      run: |
        set +e
        mcpflight diff --config "${{ inputs.config }}" > mcpflight-diff.txt 2>&1
        status=$?
        cat mcpflight-diff.txt
        echo "exit_code=$status" >> "$GITHUB_OUTPUT"
        {
          echo "body<<EOF"
          cat mcpflight-diff.txt
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        exit 0

    - name: Comment on pull request
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' && inputs.github-token != '' }}
      uses: actions/github-script@v7
      env:
        MCPFLIGHT_DIFF_BODY: ${{ steps.diff.outputs.body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const body = `### MCPFlight contract diff

          \`\`\`
          ${process.env.MCPFLIGHT_DIFF_BODY}
          \`\`\``;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });

    - name: Fail on breaking drift
      shell: bash
      run: exit "${{ steps.diff.outputs.exit_code }}"
