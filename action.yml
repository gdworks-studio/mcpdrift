name: mcpdrift contract diff
description: Run mcpdrift diff, comment the report on PRs, and fail on breaking MCP contract drift.

inputs:
  config:
    description: Path to mcpdrift.toml in the checked-out repository.
    required: false
    default: mcpdrift.toml
  github-token:
    description: GitHub token used to comment on pull requests.
    required: false
  comment:
    description: Whether to post the diff as a pull request comment.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install mcpdrift
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run mcpdrift diff
      id: diff
      shell: bash
      # care: inputs.config flows through env, never interpolated into the run
      # body (shell-injection vector flagged by Semgrep run-shell-injection).
      env:
        MCPDRIFT_CONFIG: ${{ inputs.config }}
      run: |
        set +e
        mcpdrift diff --config "$MCPDRIFT_CONFIG" > mcpdrift-diff.txt 2>&1
        status=$?
        cat mcpdrift-diff.txt
        echo "exit_code=$status" >> "$GITHUB_OUTPUT"
        {
          echo "body<<EOF"
          cat mcpdrift-diff.txt
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        exit 0

    - name: Comment on pull request
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' && inputs.github-token != '' }}
      uses: actions/github-script@v9
      env:
        MCPDRIFT_DIFF_BODY: ${{ steps.diff.outputs.body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const body = `### mcpdrift contract diff

          \`\`\`
          ${process.env.MCPDRIFT_DIFF_BODY}
          \`\`\``;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });

    - name: Fail on breaking drift
      shell: bash
      env:
        MCPDRIFT_EXIT: ${{ steps.diff.outputs.exit_code }}
      run: exit "$MCPDRIFT_EXIT"
