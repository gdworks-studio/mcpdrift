name: MCP contract

on:
  pull_request:
  push:
    branches: [main]

# The action posts the contract diff as a PR comment; that needs write on PRs.
permissions:
  contents: read
  pull-requests: write

jobs:
  mcpdrift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ./
        with:
          config: examples/sample_server/mcpdrift.toml
          github-token: ${{ secrets.GITHUB_TOKEN }}
