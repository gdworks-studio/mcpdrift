name: MCP contract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mcpflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ./
        with:
          config: examples/sample_server/mcpflight.toml
          github-token: ${{ secrets.GITHUB_TOKEN }}
