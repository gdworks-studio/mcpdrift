name: studio-os-gate

# Pre-merge gate for mcpdrift (Python CLI / GitHub Action — MCP contract diff).
# Pre-merge half of the two-gate model (vault:
# references/production-readiness-system.md). One stable required check:
# `studio-os-gate / gate`. (Separate from mcpdrift.yml, which dogfoods the action.)
#
# care: github context (github.base_ref) flows through env + quoted shell vars,
# never interpolated into a run block (shell-injection vector).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Conflict markers / stray whitespace
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff --check "origin/${BASE_REF}...HEAD"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e ".[test]"
      - name: Pytest
        run: python -m pytest -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: gitleaks (CLI image — no org license, no PR API)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest dir /repo --redact --no-banner

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Semgrep (Python + general security rules)
        run: |
          pip install --quiet semgrep
          semgrep scan --error --config p/python --config p/ci --config p/secrets

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      # No committed lockfile (pyproject only) -> resolve, freeze, then scan.
      - name: Resolve + freeze dependencies
        run: |
          pip install -e .
          pip freeze > requirements.txt
      - name: OSV-Scanner (frozen requirements)
        run: |
          curl -sSfL --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 15 "https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=requirements.txt

  risk-router:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Classify blast radius (auth / payments / deletion / migrations)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 .github/scripts/risk_router.py "origin/${BASE_REF}"

  # --- AR9: a 2nd independent scanner per surface (Argus authz/security bible).
  # "A single tool at 0 findings is evidence the tool is silent, not the surface safe."
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: TruffleHog (2nd secrets scanner — verified only)
        run: docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest filesystem /repo --only-verified --fail

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      # No committed lockfile (pyproject only) -> resolve + freeze so Trivy has a
      # dependency file to scan (mirrors the OSV deps job; without this Trivy finds
      # zero language-specific files and the 2nd dep scanner is a silent no-op).
      - name: Resolve + freeze dependencies
        run: |
          pip install -e .
          pip freeze > requirements.txt
      - name: Trivy (2nd deps/SCA + secret scanner — fixed HIGH/CRITICAL)
        run: docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs /repo --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Bandit (Python lang-native SAST — 2nd SAST)
        run: |
          pip install --quiet bandit
          bandit -r src --severity-level medium --confidence-level medium

  gate:
    runs-on: ubuntu-latest
    needs: [hygiene, test, secrets-scan, sast, deps, risk-router, trufflehog, trivy, bandit]
    if: always()
    steps:
      - name: Verdict
        run: |
          results="${{ needs.hygiene.result }} ${{ needs.test.result }} ${{ needs.secrets-scan.result }} ${{ needs.sast.result }} ${{ needs.deps.result }} ${{ needs.risk-router.result }} ${{ needs.trufflehog.result }} ${{ needs.trivy.result }} ${{ needs.bandit.result }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "::error::studio-os-gate blocked — a required job did not pass."
              exit 1
            fi
          done
          echo "studio-os-gate: all required jobs passed."
