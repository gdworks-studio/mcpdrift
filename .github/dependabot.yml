version: 2

# Automated dependency updates (Argus / dept 15). Weekly, GROUPED (minor+patch
# batched into one PR per ecosystem; majors stay individual for review). Each PR
# runs through the studio-os-gate; low-risk ones auto-merge (dependabot-automerge.yml).
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      pip-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
